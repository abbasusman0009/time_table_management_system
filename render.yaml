databases:
  - name: ttms-db
    databaseName: ttms
    user: ttms_user
    plan: free

services:
  - type: web
    name: ttms-web
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn ttms_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ttms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
