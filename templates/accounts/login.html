{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - TTMS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-4">
        <div class="card p-4 shadow">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Welcome Back</h3>
                <p class="text-muted">Login to Northeastern TTMS</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
            </form>
            <div class="mt-3 text-center">
                <small>Don't have an account? <a href="{% url 'accounts:register' %}">Register as Student</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
