{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Student Registration - TTMS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card p-4 shadow">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Student Registration</h3>
                <p class="text-muted">Create an account for Northeastern TTMS</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-3">Register</button>
            </form>
            <div class="mt-3 text-center">
                <small>Already have an account? <a href="{% url 'accounts:login' %}">Login here</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
